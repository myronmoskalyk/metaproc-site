<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="metaproc">
  <title>metaproc</title>
  <defs>
    <!-- Orbital brand gradient #11C7B4 -> #11B981 at ~160deg (BRAND.md section 7) -->
    <linearGradient id="mpTile" x1="0" y1="0" x2="0.342" y2="0.94">
      <stop offset="0" stop-color="#11C7B4"/>
      <stop offset="1" stop-color="#11B981"/>
    </linearGradient>
  </defs>
  <!-- brand-gradient app tile (same geometry as the app's inst/app/www/favicon.svg) -->
  <rect x="16" y="16" width="480" height="480" rx="105" fill="url(#mpTile)"/>
  <!-- line of no effect (forest plot reference axis) -->
  <rect x="248" y="120" width="16" height="272" rx="8" fill="#FFFFFF" opacity="0.42"/>
  <!-- pooled-effect summary diamond -->
  <polygon points="256,187 389,256 256,325 123,256" fill="#FFFFFF"/>
</svg>
